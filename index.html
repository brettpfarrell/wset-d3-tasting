<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WSET D3 – Past Tasting Papers</title>
<style>
  :root {
    --burgundy: #6b1a2a;
    --gold: #c9a84c;
    --cream: #faf7f2;
    --text: #1a1a1a;
    --muted: #5a5a5a;
    --border: #ddd4c8;
    --card-bg: #ffffff;
    --tag-bg: #f0ebe3;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  /* Header */
  header {
    background: var(--burgundy);
    color: #fff;
    padding: 24px 32px 20px;
    display: flex; align-items: center; gap: 18px;
  }
  header svg { flex-shrink: 0; }
  header h1 { font-size: 1.5rem; font-weight: normal; letter-spacing: 0.02em; }
  header p { font-size: 0.8rem; color: rgba(255,255,255,0.65); margin-top: 4px; font-family: sans-serif; }

  /* Controls */
  .controls {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  }
  .controls input, .controls select {
    font-size: 0.85rem;
    font-family: sans-serif;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    background: var(--cream);
    color: var(--text);
    outline: none;
  }
  .controls input { width: 240px; }
  .controls input:focus, .controls select:focus { border-color: var(--burgundy); }
  .controls label { font-family: sans-serif; font-size: 0.8rem; color: var(--muted); }
  .controls .count { margin-left: auto; font-family: sans-serif; font-size: 0.8rem; color: var(--muted); }

  /* View toggle */
  .view-toggle { display: flex; gap: 4px; margin-left: 4px; }
  .view-toggle button {
    border: 1px solid var(--border); background: var(--cream); cursor: pointer;
    border-radius: 6px; padding: 6px 10px; font-size: 0.8rem; font-family: sans-serif;
    color: var(--muted); transition: all .15s;
  }
  .view-toggle button.active { background: var(--burgundy); color: #fff; border-color: var(--burgundy); }

  /* Main content */
  main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

  /* ── GRID / CARD VIEW ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 20px; }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: box-shadow .15s;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.10); }

  .card-header {
    background: var(--burgundy);
    color: #fff;
    padding: 12px 16px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .card-header .sitting { font-size: 1.05rem; letter-spacing: 0.03em; }
  .card-header .sitting span { color: var(--gold); font-weight: bold; }

  .card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 12px; }

  .flight {
    border: 1px solid var(--border);
    border-radius: 7px;
    overflow: hidden;
  }
  .flight-header {
    background: var(--tag-bg);
    padding: 6px 12px;
    font-size: 0.72rem;
    font-family: sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--burgundy);
    display: flex; align-items: center; gap: 8px;
  }
  .flight-theme {
    font-weight: normal;
    text-transform: none;
    letter-spacing: 0;
    color: var(--muted);
    font-size: 0.75rem;
  }
  .flight-wines { padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; }
  .wine-item { display: flex; gap: 8px; align-items: flex-start; }
  .wine-num {
    font-size: 0.65rem; font-family: sans-serif; font-weight: 700;
    color: var(--burgundy); opacity: .7;
    min-width: 18px; padding-top: 2px;
  }
  .wine-text { font-size: 0.8rem; line-height: 1.45; }
  .wine-region { color: var(--muted); font-size: 0.73rem; }
  .wine-name { color: var(--text); }

  /* ── TABLE VIEW ── */
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); background: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; font-family: sans-serif; }
  thead tr { background: var(--burgundy); color: #fff; }
  th { padding: 10px 12px; text-align: left; white-space: nowrap; font-weight: 600; letter-spacing: 0.03em; font-size: 0.72rem; }
  td { padding: 8px 12px; vertical-align: top; border-bottom: 1px solid var(--border); line-height: 1.4; }
  tr:last-child td { border-bottom: none; }
  tr:nth-child(even) td { background: #fafaf9; }
  tr:hover td { background: #f5ede8; }
  td.sitting { white-space: nowrap; font-weight: 600; color: var(--burgundy); }
  td.theme { color: var(--muted); font-style: italic; font-size: 0.75rem; }

  /* No results */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-family: sans-serif; }
  .empty svg { opacity: .3; margin-bottom: 12px; }
</style>
</head>

function wineLines(raw) {
  if (!raw) return ['—'];
  const parts = raw.split('\n').map(s => s.trim()).filter(Boolean);
  return parts;
}

function renderWineItem(num, raw) {
  const lines = wineLines(raw);
  const region = lines.length > 1 ? lines[0] : '';
  const name = lines.length > 1 ? lines.slice(1).join(' ') : lines[0];
  return `<div class="wine-item">
    <span class="wine-num">${num}</span>
    <div class="wine-text">${region ? `<div class="wine-region">${escHtml(region)}</div>` : ''}
    <div class="wine-name">${escHtml(name)}</div></div>
  </div>`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let currentView = 'card';
let filtered = [...RAW];

function setView(v) {
  currentView = v;
  document.getElementById('btnCard').classList.toggle('active', v==='card');
  document.getElementById('btnTable').classList.toggle('active', v==='table');
  render();
}

function buildFilters() {
  const grapes = [...new Set(RAW.map(r=>r.commonGrape).filter(Boolean))].sort();
  const years = [...new Set(RAW.map(r=>r.year).filter(Boolean))].sort((a,b)=>b-a);
  const gs = document.getElementById('filterGrape');
  grapes.forEach(g => { const o=document.createElement('option'); o.value=g; o.textContent=g; gs.appendChild(o); });
  const ys = document.getElementById('filterYear');
  years.forEach(y => { const o=document.createElement('option'); o.value=y; o.textContent=y; ys.appendChild(o); });
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const grape = document.getElementById('filterGrape').value;
  const year = document.getElementById('filterYear').value;
  filtered = RAW.filter(r => {
    if (grape && r.commonGrape !== grape) return false;
    if (year && String(r.year) !== year) return false;
    if (q) {
      const blob = Object.values(r).join(' ').toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
  render();
}

function render() {
  const out = document.getElementById('output');
  document.getElementById('count').textContent = `${filtered.length} sitting${filtered.length!==1?'s':''}`;
  if (!filtered.length) {
    out.innerHTML = `<div class="empty"><svg width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2" fill="none"/><line x1="16" y1="16" x2="32" y2="32" stroke="currentColor" stroke-width="2"/></svg><p>No results found</p></div>`;
    return;
  }
  if (currentView === 'card') renderCards(out);
  else renderTable(out);
}

function renderCards(out) {
  out.innerHTML = `<div class="grid">${filtered.map(r => {
    const sitting = `<span>${escHtml(r.month)}</span> ${r.year}`;
    return `<div class="card">
      <div class="card-header"><span class="sitting">${sitting}</span></div>
      <div class="card-body">
        <div class="flight">
          <div class="flight-header">Paper 1 · Wines 1–3 <span class="flight-theme">Common grape: ${escHtml(r.commonGrape||'—')}</span></div>
          <div class="flight-wines">
            ${renderWineItem('1', r.wine1)}${renderWineItem('2', r.wine2)}${renderWineItem('3', r.wine3)}
          </div>
        </div>
        <div class="flight">
          <div class="flight-header">Paper 1 · Wines 4–6 <span class="flight-theme">Common link: ${escHtml(r.commonLink||'—')}</span></div>
          <div class="flight-wines">
            ${renderWineItem('4', r.wine4)}${renderWineItem('5', r.wine5)}${renderWineItem('6', r.wine6)}
          </div>
        </div>
        <div class="flight">
          <div class="flight-header">Paper 2 · Q3 · Wines 7–9 <span class="flight-theme">${escHtml(r.q3Theme||'—')}</span></div>
          <div class="flight-wines">
            ${renderWineItem('7', r.wine7)}${renderWineItem('8', r.wine8)}${renderWineItem('9', r.wine9)}
          </div>
        </div>
        <div class="flight">
          <div class="flight-header">Paper 2 · Q4 · Wines 10–12 <span class="flight-theme">${escHtml(r.q4Theme||'—')}</span></div>
          <div class="flight-wines">
            ${renderWineItem('10', r.wine10)}${renderWineItem('11', r.wine11)}${renderWineItem('12', r.wine12)}
          </div>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderTable(out) {
  const rows = filtered.map(r => `<tr>
    <td class="sitting">${escHtml(r.month)} ${r.year}</td>
    <td class="theme">${escHtml(r.commonGrape||'')}</td>
    <td>${escHtml(r.wine1||'')} / ${escHtml(r.wine2||'')} / ${escHtml(r.wine3||'')}</td>
    <td class="theme">${escHtml(r.commonLink||'')}</td>
    <td>${escHtml(r.wine4||'')} / ${escHtml(r.wine5||'')} / ${escHtml(r.wine6||'')}</td>
    <td class="theme">${escHtml(r.q3Theme||'')}</td>
    <td>${escHtml(r.wine7||'')} / ${escHtml(r.wine8||'')} / ${escHtml(r.wine9||'')}</td>
    <td class="theme">${escHtml(r.q4Theme||'')}</td>
  </tr>`).join('');
  out.innerHTML = `<div class="table-wrap"><table>
    <thead><tr>
      <th>Sitting</th><th>Common Grape</th><th>Wines 1–3</th>
      <th>Common Link</th><th>Wines 4–6</th>
      <th>Q3 Theme</th><th>Wines 7–9</th><th>Q4 Theme</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

buildFilters();
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('filterGrape').addEventListener('change', applyFilters);
document.getElementById('filterYear').addEventListener('change', applyFilters);
applyFilters();
</script>
</body>
</html>
